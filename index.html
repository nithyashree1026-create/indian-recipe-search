<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recipe Finder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>🍽️ Recipe Finder</h1>
    <p class="subtitle">Search recipes by name, ingredient, category or area</p>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search potato, paneer, egg, chicken, rice..." />
      <button id="searchBtn">🔍 Search</button>
      <button id="voiceBtn">🎙️ Voice</button>

      <select id="categoryFilter">
        <option value="all">All Categories</option>
        <option value="Indian Veg">Indian Veg</option>
        <option value="Indian Chicken">Indian Chicken</option>
        <option value="Chinese">Chinese</option>
        <option value="French">French</option>
        <option value="Italian">Italian</option>
        <option value="Fast Food">Fast Food</option>
        <option value="Dessert">Dessert</option>
        <option value="Snacks">Snacks</option>
        <option value="Breakfast">Breakfast</option>
      </select>

      <select id="languageSelect">
        <option value="en">English</option>
        <option value="kn">Kannada</option>
        <option value="hi">Hindi</option>
        <option value="ta">Tamil</option>
        <option value="te">Telugu</option>
        <option value="ml">Malayalam</option>
        <option value="mr">Marathi</option>
        <option value="bn">Bengali</option>
        <option value="gu">Gujarati</option>
        <option value="pa">Punjabi</option>
        <option value="ur">Urdu</option>
      </select>
    </div>

    <div id="google_translate_element"></div>

    <p id="loadingText">Loading recipes...</p>
    <p id="resultCount"></p>

    <div id="recipeContainer"></div>
  </div>

  <div id="recipeModal" class="modal">
    <div class="modal-content">
      <span id="closeModal">&times;</span>
      <div id="recipeDetails"></div>
    </div>
  </div>

  <script src="script.js"></script>

  <script>
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: "en",
        includedLanguages: "en,kn,hi,ta,te,ml,mr,bn,gu,pa,ur",
        autoDisplay: false
      }, "google_translate_element");
    }
  </script>

  <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
